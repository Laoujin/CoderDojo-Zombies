<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 600px;
      height: 400px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: {{BACKGROUND}};
      position: relative;
      overflow: hidden;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.3) 0%,
        rgba(0, 0, 0, 0.5) 40%,
        rgba(0, 0, 0, 0.85) 100%
      );
    }

    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 16px;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: auto;
    }

    .tier-badge {
      background: {{TIER_COLOR}};
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .level-badge {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
    }

    .main {
      margin-top: auto;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      line-height: 1.2;
    }

    .description {
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 16px;
      opacity: 0.95;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    .hint-box {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .hint-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .hint-text {
      font-size: 14px;
      line-height: 1.5;
      font-family: 'Consolas', 'Monaco', monospace;
    }

    code {
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="content">
    <div class="header">
      <span class="tier-badge">{{TIER}}</span>
      <span class="level-badge">Level {{LEVEL}}</span>
    </div>
    <div class="main">
      <h1 class="title">{{TITLE}}</h1>
      <p class="description">{{DESCRIPTION}}</p>
      <div class="hint-box">
        <div class="hint-label">Hint</div>
        <div class="hint-text">{{HINT}}</div>
      </div>
    </div>
  </div>
</body>
</html>
