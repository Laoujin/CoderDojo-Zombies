site_name: Zombie Apocalypse
site_description: Leer Python programmeren met een zombie spel!
site_url: https://laoujin.github.io/CoderDojo-Zombies/

exclude_docs: |
  midjourney/
  superpowers/
  levels/*/uitdagingen.md
  cards/*.md
  cards/*.py
  cards/*.html
  cards/*/*.md
  cards/output/

theme:
  name: material
  language: nl
  logo: favicon.png
  favicon: favicon.png
  palette:
    scheme: slate
    primary: red
    accent: orange
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand

extra_css:
  - stylesheets/zombie-theme.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Aan de Slag: aan-de-slag.md
  - Voor Coaches: coaches.md
  - Levels:
    - Level 1 - Keuzes: levels/level-1/uitleg.md
    - Level 2 - Loops: levels/level-2/uitleg.md
    - Level 3 - Lijsten: levels/level-3/uitleg.md
    - Level 4 - Functies: levels/level-4/uitleg.md
    - Level 4.5 - Pygame Zero: levels/level-4.5/uitleg.md
    - Level 5 - Zombie Spel: levels/level-5/uitleg.md
  - Uitdagingen:
    - Level 1: uitdagingen/level-1.md
    - Level 2: uitdagingen/level-2.md
    - Level 3: uitdagingen/level-3.md
    - Level 4: uitdagingen/level-4.md
    - Level 5: uitdagingen/level-5.md
  - Brainstorm: brainstorm.md
  - Cheatsheets:
    - Python: cheatsheet.md
    - Pygame Zero: cheatsheet-pygame.md
    - Pygame Recepten: pygame-recepten.md
