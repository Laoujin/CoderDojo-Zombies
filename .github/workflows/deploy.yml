name: Deploy MkDocs

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'levels/**'
      - 'mkdocs.yml'
      - '.github/workflows/deploy.yml'
      - 'download/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync level docs to docs/levels/
        run: |
          mkdir -p docs/levels/level-{1,2,3,4,4.5,5}
          cp levels/level-1/uitleg.md docs/levels/level-1/
          cp levels/level-2/uitleg.md docs/levels/level-2/
          cp levels/level-3/uitleg.md docs/levels/level-3/
          cp levels/level-4/uitleg.md docs/levels/level-4/
          cp levels/level-4.5/uitleg.md docs/levels/level-4.5/
          cp levels/level-5/uitleg.md docs/levels/level-5/

      - name: Create download ZIP
        run: |
          mkdir -p zombie-apocalypse
          cp -r levels zombie-apocalypse/
          cp download/LEES_MIJ.txt zombie-apocalypse/
          echo "pgzero" > zombie-apocalypse/requirements.txt
          zip -r docs/zombie-apocalypse.zip zombie-apocalypse
          rm -rf zombie-apocalypse

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mkdocs mkdocs-material

      - name: Build and deploy
        run: mkdocs gh-deploy --force
