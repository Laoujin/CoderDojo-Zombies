name: Deploy MkDocs

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'levels/**/*.md'
      - 'mkdocs.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync level docs to docs/levels/
        run: |
          mkdir -p docs/levels/level-{1,2,3,4}
          cp levels/level-1/uitleg.md docs/levels/level-1/
          cp levels/level-2/uitleg.md docs/levels/level-2/
          cp levels/level-3/uitleg.md docs/levels/level-3/
          cp levels/level-4/uitleg.md docs/levels/level-4/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mkdocs mkdocs-material

      - name: Build and deploy
        run: mkdocs gh-deploy --force
